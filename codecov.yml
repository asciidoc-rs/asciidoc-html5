coverage:
  status:
    project:
      default: false

comment:
  layout: "header, diff, flags, components"

ignore:
  # Non-normative parts of the AsciiDoc language spec: navigation, examples, and
  # partials. These carry no rules to verify, so they're excluded from spec
  # coverage.
  - "ref/asciidoc-lang/docs/modules/*/nav*.adoc"
  - "ref/asciidoc-lang/docs/modules/*/examples/**"
  - "ref/asciidoc-lang/docs/modules/*/partials/**"
  # Spec-coverage tooling.
  - "sdd/**"

component_management:
  default_rules:
    statuses:
      - type: project

  individual_components:
    - component_id: html5
      name: HTML5 renderer coverage
      paths:
        - html5/**

    - component_id: cli
      name: CLI coverage
      paths:
        - cli/**

    - component_id: spec
      name: AsciiDoc spec coverage
      paths:
        - "ref/asciidoc-lang/**/*.adoc"

    - component_id: asciidoctor
      name: Asciidoctor test coverage
      paths:
        - "ref/asciidoctor/**/*.rb"

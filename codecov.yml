coverage:
  status:
    project:
      default: false

comment:
  layout: "header, diff, flags, components"

ignore:
  # Spec-coverage tooling.
  - "sdd/**"

component_management:
  default_rules:
    statuses:
      - type: project

  individual_components:
    - component_id: html5
      name: HTML5 renderer coverage
      paths:
        - html5/**

    - component_id: cli
      name: CLI coverage
      paths:
        - cli/**

    - component_id: spec
      name: AsciiDoc spec coverage
      # Only the normative page content of each module. Navigation, examples,
      # and partials are non-normative and are not emitted into the coverage
      # report (see sdd/src/main.rs).
      paths:
        - "ref/asciidoc-lang/docs/modules/**/pages/**/*.adoc"

    - component_id: asciidoctor
      name: Asciidoctor reference coverage
      # The normative page content of each documentation module, plus the
      # Asciidoctor reference test suite. Navigation, examples, and partials are
      # non-normative and are not emitted into the coverage report (see
      # sdd/src/main.rs).
      paths:
        - "ref/asciidoctor/docs/modules/**/pages/**/*.adoc"
        - "ref/asciidoctor/test/**/*.rb"

# Configuration for release-plz — https://release-plz.dev/docs/config
#
# Lock-step workspace releases
# ----------------------------
# The two crates in this workspace (`asciidoc-html5` and `adoc`) are released
# together and always share the same version number. This is achieved with:
#
#   * a shared `version_group` on both packages, so release-plz assigns them the
#     same (highest) next version whenever a release happens; and
#   * an exact (`=`) dependency from the `adoc` CLI on `asciidoc-html5` (declared
#     in cli/Cargo.toml). Because the requirement is exact, every library release
#     bumps the CLI's manifest too, so the CLI is re-released in lock-step and
#     always requires the matching library version.
#
# The crate versions here are independent of `asciidoc-parser`: dependency bumps
# (managed by Dependabot) advance the dependency requirement, not this workspace's
# version, which is governed solely by the shared `version_group` below.

[changelog]
# Custom header, identical to release-plz's default Keep a Changelog header
# except that the trailing `## [Unreleased]` line is removed. That line lives in
# the *default header* (not the body), so overriding only `body` cannot suppress
# it — release-plz keeps emitting it verbatim into every generated changelog,
# leaving an empty `## [Unreleased]` section in the release PR. Dropping it here
# is what actually keeps that section out of the file.
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."""

# The whole body is guarded by `{% if version %}`. release-plz always passes the
# computed next version when it prepares a release, so a real release renders as
# before; commits with no version attached (the "unreleased" set) render nothing.
# This complements the header override above: together they keep an
# `## [Unreleased]` entry out of the changelog entirely.
body = """
{%- if version %}

## [{{ version | trim_start_matches(pat="v") }}]{%- if release_link -%}({{ release_link }}){% endif %}
_{{ timestamp | date(format="%d %B %Y") }}_
{% for group, commits in commits | group_by(attribute="group") -%}
{%- if group != "chore" %}
### {{ group | upper_first }}

{% for commit in commits -%}
{%- if commit.scope and commit.scope != package -%}
* *({{commit.scope}})* {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}{%- if commit.links %} ({% for link in commit.links %}[{{link.text}}]({{link.href}}) {% endfor -%}){% endif %}
{% else -%}
* {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}
{% endif -%}
{%- endfor %}

{%- endif %}

{%- endfor -%}
{%- endif %}
"""

commit_parsers = [
  { message = "^feat", group = "added" },
  { message = "^changed", group = "changed" },
  { message = "^deprecated", group = "deprecated" },
  { message = "^fix", group = "fixed" },
  { message = "^security", group = "security" },
  { message = "^chore", group = "chore" },
  { message = "^update", group = "updated dependencies" },
  { message = "^doc", group = "documented" },
  { message = "^.*", group = "other" },
]

[workspace]
# Refresh transitive dependencies (e.g. asciidoc-parser) at release time.
dependencies_update = true
# Label applied to the automatically opened release PR.
pr_labels = ["release"]
# Use the Release-PR flow: publish only when the release PR is merged to main.
release_always = false
# Commit types that trigger a release. `update` covers Dependabot bumps, so a
# new asciidoc-parser release flows through to a new release of these crates.
release_commits = "^(feat|fix|update|doc)[(:]"

# Unified workspace changelog
# ----------------------------
# The two crates release in lock-step (same version, same timestamp), so a single
# changelog at the repo root serves the whole project. The library owns that file
# and pulls in the CLI's commits via `changelog_include`; the CLI keeps no separate
# changelog of its own. Per-crate attribution is preserved by the `*(scope)*`
# rendering in the [changelog] template above.
[[package]]
name = "asciidoc-html5"
version_group = "asciidoc-html5"
# Root CHANGELOG.md, shared by the whole workspace.
changelog_path = "CHANGELOG.md"
# Fold the CLI's commits into this changelog.
changelog_include = ["adoc"]

[[package]]
name = "adoc"
version_group = "asciidoc-html5"
# The CLI's changes are recorded in the shared root changelog, so it keeps no
# changelog file of its own.
changelog_update = false
